name: Integration

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.AWS_REPO }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          cache: "npm"

      - name: Installing Dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine next version
        if: github.event_name == 'push'
        id: version
        run: |
          LAST_TAG=$(aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --query 'imageDetails[].imageTags' \
            --output text 2>/dev/null \
            | tr '\t' '\n' \
            | grep -E '^[0-9]+$' \
            | sort -n \
            | tail -1)

          if [ -z "$LAST_TAG" ]; then
            NEXT=1
          else
            NEXT=$((10#$LAST_TAG + 1))
          fi

          TAG=$(printf '%02d' "$NEXT")
          echo "Next version tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        if: github.event_name == 'push'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ steps.version.outputs.tag }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION,ECR_REPOSITORY,IMAGE_TAG
          script: |
            ECR_REGISTRY=865147226663.dkr.ecr.ap-south-1.amazonaws.com
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
            cd ~/one-tone-web
            echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" > .env
            docker compose pull
            docker compose up -d
